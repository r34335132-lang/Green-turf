kind = "mobile"
previewPath = "/"
title = "GREEN TURF"
version = "1.0.0"
id = "artifacts/green-turf"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 25160

[services.development]
run = "pnpm --filter @workspace/green-turf run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/green-turf", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/green-turf", "run", "serve" ]

[services.env]
PORT = "25160"
BASE_PATH = "/"
